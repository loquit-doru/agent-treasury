[profile.default]
src = "contracts"
out = "contracts/out"
libs = ["contracts/lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
remappings = [
  "@openzeppelin/contracts/=contracts/lib/openzeppelin-contracts/contracts/",
  "forge-std/=contracts/lib/forge-std/src/",
]

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
